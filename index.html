<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Unser Countdown ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3a0);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

#countdown{
    font-size:2rem;
    line-height:1.7;
    font-weight:bold;
}

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.heart{
    position:absolute;
    bottom:-50px;
    color:#fff;
    animation:float linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(0) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">
    <h1>❤️ Bis wir uns wiedersehen ❤️</h1>

    <div id="countdown"></div>

    <p style="margin-top:25px;font-size:1.2rem;">
        Ich freue mich schon auf dich 🥰
    </p>
</div>

<script>

// Zielzeit
const target = new Date("2026-07-23T15:30:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();
    const distance = target - now;

    if(distance <= 0){
        document.getElementById("countdown").innerHTML =
        "<h2>❤️ Endlich zusammen! ❤️</h2>";
        return;
    }

    const days = Math.floor(distance/(1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds = Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
    `
    <div>${days} Tage</div>
    <div>${hours} Stunden</div>
    <div>${minutes} Minuten</div>
    <div>${seconds} Sekunden</div>
    `;
}

updateCountdown();
setInterval(updateCountdown,1000);


// Animierte Herzen
const hearts = document.querySelector(".hearts");

for(let i=0;i<40;i++){

    const heart=document.createElement("div");
    heart.classList.add("heart");

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*35)+"px";
    heart.style.animationDuration=(6+Math.random()*8)+"s";
    heart.style.animationDelay=Math.random()*8+"s";

    hearts.appendChild(heart);
}

</script>

</body>
</html>
