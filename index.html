<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Unser Countdown ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#ff7aa2,#ff9cc0,#ffd3e2);
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

.container{
    width:92%;
    max-width:420px;

    padding:30px 20px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(12px);

    border-radius:25px;

    text-align:center;

    color:white;

    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    font-size:2rem;
    margin-bottom:10px;
}

.subtitle{
    opacity:.95;
    margin-bottom:30px;
    font-size:1rem;
}

#countdown{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.time-box{

    background:rgba(255,255,255,.18);
    border-radius:18px;

    padding:18px 10px;
}

.value{

    font-size:2rem;
    font-weight:bold;
}

.label{

    margin-top:6px;
    font-size:.9rem;
}

.message{

    margin-top:30px;
    font-size:1rem;
}

.hearts{

    position:fixed;
    inset:0;
    pointer-events:none;
}

.heart{

    position:absolute;
    bottom:-30px;

    animation:float linear infinite;

    opacity:.75;
}

@keyframes float{

    from{
        transform:translateY(0) rotate(0deg);
    }

    to{
        transform:translateY(-120vh) rotate(360deg);
    }

}

.big-heart{

    font-size:55px;
    animation:pulse 1.8s infinite;
    margin-bottom:15px;
}

@keyframes pulse{

    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}

}

</style>
</head>

<body>

<div class="hearts"></div>

<div class="container">

<div class="big-heart">❤️</div>

<h1>Bis wir uns wiedersehen</h1>

<div class="subtitle">
23. Juli 2026 · 15:30 Uhr
</div>

<div id="countdown"></div>

<div class="message">
Ich freue mich schon riesig auf dich 🥰
</div>

</div>

<script>

const target=new Date("2026-07-23T15:30:00").getTime();

function update(){

const now=Date.now();

const diff=target-now;

if(diff<=0){

document.querySelector(".container").innerHTML=
`
<div style="font-size:80px;">❤️</div>

<h1>Endlich zusammen!</h1>

<p style="margin-top:20px;font-size:20px;">
Ich hoffe, wir genießen jede Sekunde zusammen. 🥰
</p>
`;

return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor(diff%86400000/3600000);
const m=Math.floor(diff%3600000/60000);
const s=Math.floor(diff%60000/1000);

document.getElementById("countdown").innerHTML=`

<div class="time-box">
<div class="value">${d}</div>
<div class="label">Tage</div>
</div>

<div class="time-box">
<div class="value">${h}</div>
<div class="label">Stunden</div>
</div>

<div class="time-box">
<div class="value">${m}</div>
<div class="label">Minuten</div>
</div>

<div class="time-box">
<div class="value">${s}</div>
<div class="label">Sekunden</div>
</div>

`;

}

update();
setInterval(update,1000);

const hearts=document.querySelector(".hearts");

for(let i=0;i<35;i++){

const h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"❤️":"💕";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*22)+"px";

h.style.animationDuration=(7+Math.random()*7)+"s";

h.style.animationDelay=Math.random()*7+"s";

hearts.appendChild(h);

}

</script>

</body>
</html>
